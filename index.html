<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キショー＆アサヒの予想教室</title>
<style>
  :root {
    --kisho-color: #4a9eff;
    --kisho-bg: #0d2a4a;
    --asahi-color: #ff7a4a;
    --asahi-bg: #4a1a0a;
    --bg1: #0e0e1e;
    --bg2: #1a2a40;
    --bg3: #3a2000;
    --glass: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', 'Yu Gothic', sans-serif;
    background:
      radial-gradient(ellipse at 70% 0%, rgba(255,160,40,0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 30% 0%, rgba(255,100,20,0.10) 0%, transparent 45%),
      linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #e8e8f0;
  }

  /* ──────── LOADING OVERLAY ──────── */
  #loading {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,10,20,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 16px;
  }
  #loading.hidden { display: none; }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: var(--kisho-color);
    border-right-color: var(--asahi-color);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #load-status { font-size: 0.85rem; color: rgba(255,255,255,0.55); }

  /* ──────── WRAPPER ──────── */
  #app {
    width: 100%; max-width: 680px;
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
  }

  /* ──────── HEADER ──────── */
  header {
    padding: 12px 16px 8px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,20,0.5);
    backdrop-filter: blur(6px);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 1rem; font-weight: 700; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.88);
  }
  header p { font-size: 0.72rem; color: rgba(255,255,255,0.38); margin-top: 2px; }

  /* ──────── CHARACTER BAR ──────── */
  #char-bar {
    display: flex; justify-content: space-between;
    padding: 10px 12px 6px;
    flex-shrink: 0;
  }
  .char-card {
    display: flex; align-items: center; gap: 8px;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 6px 10px;
    width: 48%;
  }
  .char-card.kisho { border-color: rgba(74,158,255,0.3); }
  .char-card.asahi { flex-direction: row-reverse; border-color: rgba(255,122,74,0.3); }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; font-weight: 900; flex-shrink: 0;
    position: relative;
  }
  .avatar.k {
    background: var(--kisho-bg);
    border: 2px solid var(--kisho-color);
    color: var(--kisho-color);
  }
  .avatar.a {
    background: var(--asahi-bg);
    border: 2px solid var(--asahi-color);
    color: var(--asahi-color);
  }
  /* glasses */
  .avatar.k::after {
    content: '眼';
    position: absolute; bottom: -2px; right: -2px;
    font-size: 0.45rem; color: rgba(74,158,255,0.7);
    background: #0d2a4a; border-radius: 3px; padding: 0 1px;
    line-height: 1.3;
  }
  .char-info { flex: 1; min-width: 0; }
  .char-name { font-size: 0.8rem; font-weight: 700; white-space: nowrap; }
  .char-name.k { color: var(--kisho-color); }
  .char-name.a { color: var(--asahi-color); text-align: right; }
  .char-desc { font-size: 0.62rem; color: rgba(255,255,255,0.38); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .char-card.asahi .char-desc { text-align: right; }

  /* ──────── CHAT AREA ──────── */
  #chat {
    flex: 1; overflow-y: auto;
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 10px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

  .msg-row { display: flex; gap: 8px; align-items: flex-end; }
  .msg-row.kisho-row { flex-direction: row; }
  .msg-row.asahi-row { flex-direction: row-reverse; }
  .msg-row.user-row { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-weight: 700; flex-shrink: 0;
    align-self: flex-end;
  }
  .msg-avatar.k { background: var(--kisho-bg); border: 1.5px solid var(--kisho-color); color: var(--kisho-color); }
  .msg-avatar.a { background: var(--asahi-bg); border: 1.5px solid var(--asahi-color); color: var(--asahi-color); }
  .msg-avatar.u { background: rgba(80,60,120,0.6); border: 1.5px solid rgba(180,140,255,0.5); color: rgba(220,200,255,0.9); font-size: 0.7rem; }

  .bubble {
    max-width: 72%; padding: 9px 12px;
    border-radius: 14px; font-size: 0.875rem; line-height: 1.55;
    word-break: break-word;
  }
  .bubble.k {
    background: rgba(20,50,90,0.75);
    border: 1px solid rgba(74,158,255,0.25);
    border-bottom-left-radius: 4px;
    color: #d0e8ff;
  }
  .bubble.a {
    background: rgba(80,30,10,0.75);
    border: 1px solid rgba(255,122,74,0.25);
    border-bottom-right-radius: 4px;
    color: #ffd8c0;
  }
  .bubble.u {
    background: rgba(60,40,100,0.65);
    border: 1px solid rgba(160,120,255,0.2);
    border-bottom-right-radius: 4px;
    color: #e0d0ff;
  }
  .bubble.sys {
    align-self: center; font-size: 0.72rem;
    color: rgba(255,255,255,0.35);
    background: none; border: none; padding: 2px 0;
    max-width: 100%; text-align: center;
  }
  .speaker-label {
    font-size: 0.65rem; margin-bottom: 3px; font-weight: 700; letter-spacing: 0.05em;
  }
  .speaker-label.k { color: var(--kisho-color); }
  .speaker-label.a { color: var(--asahi-color); text-align: right; }

  /* typing */
  .typing-dots { display: flex; gap: 4px; padding: 4px 2px; }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.4);
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* ──────── INPUT BAR ──────── */
  #input-bar {
    display: flex; gap: 8px;
    padding: 10px 12px 14px;
    border-top: 1px solid var(--border);
    background: rgba(10,10,20,0.6);
    backdrop-filter: blur(8px);
    flex-shrink: 0;
  }
  #user-input {
    flex: 1; background: rgba(255,255,255,0.07);
    border: 1px solid var(--border); border-radius: 22px;
    padding: 10px 16px; color: #e8e8f0; font-size: 0.9rem;
    outline: none; resize: none; max-height: 90px; line-height: 1.4;
    font-family: inherit;
  }
  #user-input:focus { border-color: rgba(74,158,255,0.4); }
  #user-input::placeholder { color: rgba(255,255,255,0.25); }
  #send-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: linear-gradient(135deg, var(--kisho-color), var(--asahi-color));
    border: none; cursor: pointer; color: white; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; align-self: flex-end;
    transition: opacity 0.2s, transform 0.1s;
  }
  #send-btn:hover { opacity: 0.85; }
  #send-btn:active { transform: scale(0.94); }
  #send-btn:disabled { opacity: 0.35; cursor: default; }

  /* ──────── ERROR BANNER ──────── */
  #error-banner {
    margin: 8px 12px 0;
    background: rgba(200,40,40,0.2); border: 1px solid rgba(200,40,40,0.4);
    border-radius: 8px; padding: 8px 12px; font-size: 0.78rem; color: #ffaaaa;
    display: none;
  }
  #error-banner.show { display: block; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div id="load-status">データ読み込み中…</div>
</div>

<div id="app">
  <header>
    <h1>📚 キショー＆アサヒの予想教室</h1>
    <p>ボクマダネムイヨ応援部屋 ― 放課後の黒板前</p>
  </header>

  <div id="char-bar">
    <div class="char-card kisho">
      <div class="avatar k">棋</div>
      <div class="char-info">
        <div class="char-name k">キショー</div>
        <div class="char-desc">…数字は嘘をつかない</div>
      </div>
    </div>
    <div class="char-card asahi">
      <div class="avatar a">旭</div>
      <div class="char-info">
        <div class="char-name a">アサヒ</div>
        <div class="char-desc">絶対くるっすよ先輩！</div>
      </div>
    </div>
  </div>

  <div id="error-banner"></div>
  <div id="chat"></div>

  <div id="input-bar">
    <textarea id="user-input" rows="1" placeholder="何か聞いてみる…" disabled></textarea>
    <button id="send-btn" disabled>➤</button>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycby4I01HxSCN5-pO3XCrsgjC75Q2czoZiIjWKqH8qHn1EEMYUcsB9TiTJSXMXiqyUKr_/exec";
const REPO_API = "https://api.github.com/repos/Jiz41/boku-mada-nemui-yo/git/trees/main?recursive=1";
const RAW_BASE = "https://raw.githubusercontent.com/Jiz41/boku-mada-nemui-yo/main/";

let systemInstruction = "";
let messages = [];
let busy = false;

// ──────── DATA LOADING ────────
async function loadAllData() {
  setLoadStatus("リポジトリ構造を取得中…");
  const treeRes = await fetch(REPO_API);
  const tree = await treeRes.json();
  const dataFiles = tree.tree
    .filter(f => f.path.startsWith("data/") && f.path.endsWith(".json"))
    .map(f => f.path);

  setLoadStatus(`JSONファイル ${dataFiles.length}件 取得中…`);
  const fetched = {};
  await Promise.all(dataFiles.map(async path => {
    try {
      const r = await fetch(RAW_BASE + path);
      fetched[path] = await r.json();
    } catch(_) { fetched[path] = null; }
  }));
  return fetched;
}

function setLoadStatus(msg) {
  document.getElementById("load-status").textContent = msg;
}

// ──────── SYSTEM INSTRUCTION BUILDER ────────
function buildSystemInstruction(fetched) {
  const profile = fetched["data/profile.json"];
  const parTimes = fetched["data/master/par_times.json"];
  const courseBias = fetched["data/master/course_bias.json"];

  const records = Object.entries(fetched)
    .filter(([k]) => k.startsWith("data/records/") && fetched[k])
    .map(([,v]) => v)
    .sort((a,b) => (a.date||"").localeCompare(b.date||""));

  const entries = Object.entries(fetched)
    .filter(([k]) => k.startsWith("data/entries/") && fetched[k])
    .map(([,v]) => v)
    .sort((a,b) => (a.race_info?.["日付"]||"").localeCompare(b.race_info?.["日付"]||""));

  let s = [];

  s.push(`あなたはキショーとアサヒの2人を同時に演じる。
ボクマダネムイヨの予想について教室で話し合う高校生2人組。

キショー（先輩）:
- データ派・クールイケメン・無口・眼鏡・敬語なし
- 口癖: 「…数字は嘘をつかない」「問題ない」「…そういうことだ」
- 感情を出さず淡々とデータで語る。短文。

アサヒ（後輩）:
- 感覚派・ワイルドイケメン・熱血・制服着崩し
- 口癖: 「先輩！絶対くるっすよ！」「俺の読みは外れないっす！」「マジっすか！」
- 直感と勢いで語る。先輩を煽る。語尾に「っす」「ッスよ」。

ルール:
1. ユーザーの質問に対して必ず2人が交互に会話形式で答える
2. 返答は必ず【キショー】【アサヒ】の行頭マーカーを使う（複数ターン可）
3. 以下の知識ベースのデータを必ず参照し、具体的な数字を出す
4. 日本語で答える
5. マーカー以外の地の文は入れない

フォーマット例:
【キショー】…枠5の複勝率は40.8%。問題ない。
【アサヒ】先輩それっすよ！川田騎手も乗ってるし絶対くるっすよ！
【キショー】騎手の阪神ダート複勝率を見ろ。答えは出てる。
【アサヒ】マジっすか！俺の直感とも合致してるっす！`);

  s.push("\n=== 知識ベース ===\n");

  // Profile
  if (profile) {
    s.push("## ボクマダネムイヨ プロフィール");
    if (profile.profile) {
      Object.entries(profile.profile).forEach(([k,v]) => s.push(`- ${k}: ${v}`));
    }
    if (profile.career_summary) {
      const c = profile.career_summary;
      s.push(`- 戦績: ${c.total}戦${c.wins}勝 複勝${c.places}回 (${c.last_updated}現在)`);
    }
    if (profile.preferred_distance) s.push(`- 適距離: ${profile.preferred_distance}`);
    if (profile.pedigree) {
      const p = profile.pedigree;
      s.push(`- 血統: 父 ${p["父"] || "-"} / 母 ${p["母"] || "-"} / 母父 ${p["母父"] || "-"}`);
    }
    if (profile.notes) s.push(`- 備考: ${profile.notes}`);
    s.push("");
  }

  // Records
  if (records.length > 0) {
    s.push("## 戦績一覧");
    s.push("| 日付 | 競馬場 | レース名 | クラス | 距離 | 馬場 | 枠 | 馬番 | 着順 | 騎手 | タイム | 上り3F | 人気 | オッズ | 賞金(万) |");
    s.push("|---|---|---|---|---|---|---|---|---|---|---|---|---|---|---|");
    records.forEach(r => {
      const res = r.result || {};
      s.push(`| ${r.date||"-"} | ${r.venue_code||"-"} | ${r.race_name||"-"} | ${r.class||"-"} | ${r.distance||"-"} | ${r.condition||"-"} | ${r.frame_no||"-"} | ${r.horse_no||"-"} | ${res["着順"]||"-"}着 | ${res["騎手"]||"-"} | ${res["タイム"]||"-"} | ${res["上り3F"]||"-"} | ${res["人気"]||"-"}人気 | ${res["オッズ"]||"-"} | ${res["賞金万円"]||"-"} |`);
    });
    s.push("");
  }

  // Entries
  if (entries.length > 0) {
    entries.forEach(entry => {
      const ri = entry.race_info || {};
      const w = entry.weather || {};
      s.push(`## 出走情報: ${ri["日付"]||"?"} ${ri["競馬場"]||"?"}R${ri["R"]||"?"} ${ri["レース名"]||"?"}`);
      s.push(`距離: ${ri["距離"]||"-"} ${ri["トラック"]||"-"} / 発走: ${ri["発走時刻"]||"-"} / 天候: ${w["天候"]||"-"} / 馬場: ${w["馬場状態"]||"-"}`);
      if ((entry.entries||[]).length > 0) {
        s.push("| 馬番 | 枠番 | 馬名 | 騎手 | 斤量 | 過去3走(着順) | 騎手阪神複勝 | 騎手直近1ヶ月 | 厩舎 | 厩舎傾向 |");
        s.push("|---|---|---|---|---|---|---|---|---|---|");
        entry.entries.forEach(e => {
          const past = (e["過去3走"]||[]).map(p => {
            if (p["レース名"] === "---") return "-";
            return `${(p["レース名"]||"").slice(0,6)}(${p["着順"]}着/${p["距離"]}/${p["馬場"]})`;
          }).join(" → ");
          const jc = e["騎手成績"]||{};
          s.push(`| ${e["馬番"]} | ${e["枠番"]} | ${e["馬名"]} | ${e["騎手"]} | ${e["斤量"]} | ${past} | ${jc["当該コース複勝率"]||"-"} | ${jc["直近1ヶ月複勝率"]||"-"} | ${e["厩舎"]||"-"} | ${e["厩舎傾向"]||"-"} |`);
        });
      }
      s.push("");
    });
  }

  // Par times (summary)
  if (parTimes && parTimes.tracks) {
    s.push("## 阪神ダート基準タイム (par_times)");
    const hans = parTimes.tracks.find(t => t.venue === "阪神" || t.venue_code === "09");
    if (hans && hans.distances) {
      hans.distances.forEach(d => {
        const rows = (d.conditions||[]).map(c => `${c.condition}:${c.par_time}`).join(" / ");
        s.push(`- ${d.distance}: ${rows}`);
      });
    }
    s.push("");
  }

  // Course bias
  if (courseBias) {
    s.push("## コースバイアス");
    const entries2 = Array.isArray(courseBias) ? courseBias : (courseBias.data || []);
    entries2.slice(0, 10).forEach(b => {
      s.push(`- ${b.venue||b.競馬場||"?"} ${b.distance||b.距離||"?"} ${b.track||b.トラック||""}: ${b.bias||b.バイアス||b.comment||""}`);
    });
    s.push("");
  }

  return s.join("\n");
}

// ──────── CHAT RENDERING ────────
function addSysMsg(text) {
  const chat = document.getElementById("chat");
  const row = document.createElement("div");
  row.className = "msg-row";
  const bub = document.createElement("div");
  bub.className = "bubble sys";
  bub.textContent = text;
  row.appendChild(bub);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function addUserMsg(text) {
  const chat = document.getElementById("chat");
  const row = document.createElement("div");
  row.className = "msg-row user-row";
  const av = document.createElement("div");
  av.className = "msg-avatar u";
  av.textContent = "你";
  const bub = document.createElement("div");
  bub.className = "bubble u";
  bub.textContent = text;
  row.appendChild(bub);
  row.appendChild(av);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function addCharMsg(speaker, text) {
  const chat = document.getElementById("chat");
  const isK = speaker === "キショー";
  const row = document.createElement("div");
  row.className = `msg-row ${isK ? "kisho-row" : "asahi-row"}`;
  const av = document.createElement("div");
  av.className = `msg-avatar ${isK ? "k" : "a"}`;
  av.textContent = isK ? "棋" : "旭";
  const wrap = document.createElement("div");
  wrap.style.display = "flex";
  wrap.style.flexDirection = "column";
  wrap.style.maxWidth = "72%";
  const label = document.createElement("div");
  label.className = `speaker-label ${isK ? "k" : "a"}`;
  label.textContent = isK ? "キショー" : "アサヒ";
  const bub = document.createElement("div");
  bub.className = `bubble ${isK ? "k" : "a"}`;
  bub.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(bub);
  if (isK) {
    row.appendChild(av);
    row.appendChild(wrap);
  } else {
    row.appendChild(wrap);
    row.appendChild(av);
  }
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById("chat");
  const row = document.createElement("div");
  row.id = "typing-row";
  row.className = "msg-row kisho-row";
  const av = document.createElement("div");
  av.className = "msg-avatar k";
  av.textContent = "棋";
  const bub = document.createElement("div");
  bub.className = "bubble k";
  bub.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  row.appendChild(av);
  row.appendChild(bub);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
  return row;
}

function parseResponse(text) {
  const lines = [];
  const regex = /【(キショー|アサヒ)】([\s\S]*?)(?=【(?:キショー|アサヒ)】|$)/g;
  let m;
  while ((m = regex.exec(text)) !== null) {
    const content = m[2].trim();
    if (content) lines.push({ speaker: m[1], text: content });
  }
  return lines.length > 0 ? lines : [{ speaker: "キショー", text: text.trim() }];
}

// ──────── SEND MESSAGE ────────
async function sendMessage(userText) {
  if (busy || !userText.trim()) return;
  busy = true;
  document.getElementById("send-btn").disabled = true;
  document.getElementById("user-input").disabled = true;

  addUserMsg(userText);
  messages.push({ role: "user", content: userText });

  const typingEl = showTyping();

  try {
    const res = await fetch(GAS_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ systemInstruction, messages }),
    });
    const data = await res.json();
    typingEl.remove();

    if (data.error) throw new Error(data.error);

    const responseText = data.response || "";
    const parsed = parseResponse(responseText);
    parsed.forEach(({ speaker, text }) => addCharMsg(speaker, text));
    messages.push({ role: "assistant", content: responseText });

  } catch (err) {
    typingEl.remove();
    showError("エラー: " + err.message);
  }

  busy = false;
  document.getElementById("send-btn").disabled = false;
  document.getElementById("user-input").disabled = false;
  document.getElementById("user-input").focus();
}

function showError(msg) {
  const el = document.getElementById("error-banner");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 6000);
}

// ──────── INIT ────────
async function init() {
  try {
    const fetched = await loadAllData();
    setLoadStatus("systemInstruction 構築中…");
    systemInstruction = buildSystemInstruction(fetched);

    document.getElementById("loading").classList.add("hidden");
    document.getElementById("user-input").disabled = false;
    document.getElementById("send-btn").disabled = false;
    document.getElementById("user-input").focus();

    addSysMsg("📖 データ読み込み完了 — 放課後の教室");
    addSysMsg("ボクマダネムイヨの予想について何でも聞いてね");
    setTimeout(() => {
      const greet = [
        { speaker: "キショー", text: "…全データ確認した。準備はできてる。" },
        { speaker: "アサヒ", text: "先輩！早速予想しましょうよ！俺の直感が疼いてるっす！" },
      ];
      greet.forEach(g => addCharMsg(g.speaker, g.text));
    }, 400);

  } catch (err) {
    setLoadStatus("読み込みエラー: " + err.message);
  }
}

// ──────── EVENTS ────────
document.getElementById("send-btn").addEventListener("click", () => {
  const inp = document.getElementById("user-input");
  const text = inp.value.trim();
  if (!text) return;
  inp.value = "";
  inp.style.height = "";
  sendMessage(text);
});

document.getElementById("user-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    document.getElementById("send-btn").click();
  }
});

document.getElementById("user-input").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 90) + "px";
});

if (GAS_URL === "YOUR_GAS_URL_HERE") {
  document.getElementById("loading").classList.add("hidden");
  document.getElementById("user-input").disabled = false;
  document.getElementById("send-btn").disabled = false;
  addSysMsg("⚠️ GAS_URLが未設定です。boku_proxy.gsをデプロイしてURLを差し替えてください。");
  const greet = [
    { speaker: "キショー", text: "…GAS_URLを設定してくれ。それだけでいい。" },
    { speaker: "アサヒ", text: "早く設定してくれっすよ！予想したくてうずうずしてるっす！" },
  ];
  greet.forEach(g => addCharMsg(g.speaker, g.text));
} else {
  init();
}
</script>
